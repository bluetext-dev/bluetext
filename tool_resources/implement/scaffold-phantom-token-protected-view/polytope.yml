tools:
  scaffold-phantom-token-protected-view:
    info: |
      Scaffolds a React view protected by the Curity Phantom Token handler.
      Adds a new route component to the specified service.
    inputs:
      name:
        info: "The name of the view/route (e.g. 'admin')"
        type: str
      service:
        info: "The service to add the view to (e.g. 'web-app')"
        type: str
    run:
      - id: scaffold-view
        code: |-
          pt.js
          const viewName = pt.param("name");
          const serviceName = pt.param("service");

          const script = `
          from pathlib import Path
          import re

          view_name = "${viewName}"
          service_name = "${serviceName}"

          # Read the template file
          template_path = Path("/template/protected-view.tsx.template")

          if not template_path.exists():
              print(f"Template not found: {template_path}")
              exit(1)

          template_content = template_path.read_text()

          # Simple replacement
          content = template_content.replace("{{ view_name | capitalize }}", view_name.capitalize())
          content = content.replace("{{ view_name }}", view_name)

          # Determine output path
          output_path = Path(f"/repo/services/{service_name}/app/routes/{view_name}.tsx")

          # Ensure directory exists
          output_path.parent.mkdir(parents=True, exist_ok=True)

          # Write the file
          output_path.write_text(content)

          print(f"Created protected view: services/{service_name}/app/routes/{view_name}.tsx")

          # --- Register route in routes.ts ---
          routes_path = Path(f"/repo/services/{service_name}/app/routes.ts")
          if not routes_path.exists():
              print(f"routes.ts not found at {routes_path}, skipping route registration")
              exit(0)

          routes_content = routes_path.read_text()

          # Ensure 'route' is imported from @react-router/dev/routes
          if 'route' not in routes_content or not re.search(r'\\broute\\b', routes_content.split('from')[0] if 'from' in routes_content else ''):
              # Check if there's an existing import from @react-router/dev/routes
              import_match = re.search(
                  r"import\\s*\\{([^}]*)\\}\\s*from\\s*[\\\"']@react-router/dev/routes[\\\"']",
                  routes_content
              )
              if import_match:
                  imports = import_match.group(1)
                  if 'route' not in imports:
                      new_imports = imports.rstrip() + ', route'
                      routes_content = routes_content[:import_match.start(1)] + new_imports + routes_content[import_match.end(1):]
                      print("Added 'route' to existing @react-router/dev/routes import")
              else:
                  print("Could not find @react-router/dev/routes import, skipping route registration")
                  exit(0)

          # Check if route already registered
          route_entry = f'route("{view_name}", "routes/{view_name}.tsx")'
          if route_entry in routes_content:
              print(f"Route '{view_name}' already registered in routes.ts")
              exit(0)

          # Find the routes array and append before the closing bracket
          array_match = re.search(r'(return\\s*\\[)(.*?)(\\])', routes_content, re.DOTALL)
          if not array_match:
              array_match = re.search(r'(\\[)(.*?)(\\]\\s*;?\\s*\\})', routes_content, re.DOTALL)

          if array_match:
              array_content = array_match.group(2)
              if array_content.strip():
                  new_entry = f',\\n    {route_entry}'
              else:
                  new_entry = f'\\n    {route_entry}'

              insert_pos = array_match.end(2)
              routes_content = routes_content[:insert_pos] + new_entry + routes_content[insert_pos:]

              routes_path.write_text(routes_content)
              print(f"Registered route '{view_name}' in routes.ts")
          else:
              print("Could not find routes array in routes.ts, skipping route registration")
          `;

          pt.callModule("pt/run-script", {
            repo: { type: "host", path: "." },
            language: "python",
            mounts: [{
              path: "/template",
              source: { type: "repo", repo: pt.moduleRepoRef, path: "/tool_resources/implement/scaffold-phantom-token-protected-view/template" }
            }],
            script: { type: "string", data: script }
          });
