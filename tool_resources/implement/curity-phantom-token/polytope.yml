tools:
  implement-curity-phantom-token:
    info: |
      Implements the Curity Phantom Token Pattern.
      Adds JWT Validator to Python clients and Phantom Token Handler to TypeScript clients.
      Appends Kong configuration to config/<kong-service>/kong.yml.
      Ensures Kong and Curity services exist (adds them if missing).
    inputs:
      kong-service:
        info: Name of your Kong service (the directory name under services/)
        type: str
      postgres-service:
        info: Name of the postgres service that Curity uses
        type: str
      api-service:
        info: Name of the API service (the directory name under services/)
        type: [default, str, python-fast-api]
      web-app-service:
        info: Name of the react-web-app service to set up auth in
        type: [default, str, react-web-app]
      web-app-default-view:
        info: "Name of the default protected view to scaffold (e.g. 'dashboard')"
        type: [default, str, dashboard]
    run:
      - id: ensure-kong-exists
        code: |-
          pt.js
          const kongService = pt.param("kong-service");
          let exists = false;
          try {
            pt.readRepoFile(`services/${kongService}/polytope.yml`);
            exists = true;
          } catch (e) {
            // does not exist
          }
          if (exists) {
            pt.log(`Kong service '${kongService}' already exists, skipping`);
          } else {
            pt.log(`Kong service '${kongService}' not found, adding it`);
            pt.callModule("add-and-run-service", {
              "template-and-variables": { kong: {} },
              "custom-name": kongService,
              "add-to": "stack",
              run: false
            });
          }

      - id: ensure-postgres-exists
        code: |-
          pt.js
          const postgresService = pt.param("postgres-service");
          // Check both filesystem and polytope.yml registration
          let exists = false;
          try {
            pt.readRepoFile(`services/${postgresService}/polytope.yml`);
            exists = true;
          } catch (e) {}
          if (!exists) {
            try {
              const config = pt.readYaml(pt.readRepoFile("polytope.yml")) || {};
              if ((config.tools || {})[postgresService]) exists = true;
            } catch (e) {}
          }
          if (exists) {
            pt.log(`Postgres service '${postgresService}' already exists, skipping`);
          } else {
            pt.log(`Postgres service '${postgresService}' not found, adding it`);
            pt.callModule("add-and-run-service", {
              "template-and-variables": { "postgres-server": {} },
              "custom-name": postgresService,
              "add-to": "stack",
              run: false
            });
          }

      - id: ensure-curity-exists
        after:
          - step: ensure-postgres-exists
        code: |-
          pt.js
          const postgresService = pt.param("postgres-service");
          let exists = false;
          try {
            pt.readRepoFile("services/curity/polytope.yml");
            exists = true;
          } catch (e) {
            // does not exist
          }
          if (exists) {
            pt.log("Curity service already exists, skipping");
          } else {
            pt.log("Curity service not found, adding it");
            pt.callModule("add-and-run-service", {
              "template-and-variables": {
                curity: {
                  "postgres-service": postgresService
                }
              },
              "add-to": "stack",
              run: false
            });
          }

      - id: ensure-scm-exists
        after:
          - step: ensure-postgres-exists
        code: |-
          pt.js
          let exists = false;
          try {
            pt.readRepoFile("services/service-config-manager/polytope.yml");
            exists = true;
          } catch (e) {
            // does not exist
          }
          if (exists) {
            pt.log("Service-config-manager already exists, skipping");
          } else {
            pt.log("Service-config-manager not found, adding it");
            pt.callModule("add-and-run-service", {
              "template-and-variables": { "service-config-manager": {} },
              "add-to": "stack",
              run: false
            });
          }

      - id: ensure-api-exists
        code: |-
          pt.js
          const apiService = pt.param("api-service");
          let exists = false;
          try {
            pt.readRepoFile(`services/${apiService}/polytope.yml`);
            exists = true;
          } catch (e) {}
          if (exists) {
            pt.log(`API service '${apiService}' already exists, skipping`);
          } else {
            pt.log(`API service '${apiService}' not found, adding it`);
            pt.callModule("add-and-run-service", {
              "template-and-variables": { "python-fast-api": {} },
              "custom-name": apiService,
              "add-to": "stack",
              run: false
            });
          }

      - id: ensure-web-app-exists
        code: |-
          pt.js
          const webAppService = pt.param("web-app-service");
          let exists = false;
          try {
            pt.readRepoFile(`services/${webAppService}/polytope.yml`);
            exists = true;
          } catch (e) {}
          if (exists) {
            pt.log(`Web app service '${webAppService}' already exists, skipping`);
          } else {
            pt.log(`Web app service '${webAppService}' not found, adding it`);
            pt.callModule("add-and-run-service", {
              "template-and-variables": { "react-web-app": {} },
              "custom-name": webAppService,
              "add-to": "stack",
              run: false
            });
          }

      - id: register-postgres-with-scm
        after:
          - step: ensure-scm-exists
        tool: pt/run-script
        args:
          repo: {type: host, path: .}
          language: python
          dependencies: [pyyaml]
          script:
            type: string
            data: |
              import yaml
              from pathlib import Path
              import sys

              service_name = "{pt.param postgres-service}"
              server_type = "postgres"
              config_manager_service = "service-config-manager"
              config_manager_polytope = Path(f"/repo/services/{config_manager_service}/polytope.yml")

              if not config_manager_polytope.exists():
                  print("ERROR: service-config-manager not found.")
                  sys.exit(1)

              # 1. Update managed-services.yaml
              managed_services_path = Path(f"/repo/config/{config_manager_service}/managed-services.yaml")
              if not managed_services_path.exists():
                  managed_services_path.parent.mkdir(parents=True, exist_ok=True)
                  managed_services = []
              else:
                  with open(managed_services_path) as f:
                      managed_services = yaml.safe_load(f) or []

              existing = next((s for s in managed_services if s["name"] == service_name), None)
              if existing:
                  print(f"Service {service_name} already registered")
              else:
                  managed_services.append({"name": service_name, "type": server_type, "config_dir": service_name})
                  with open(managed_services_path, "w") as f:
                      yaml.dump(managed_services, f, default_flow_style=False, sort_keys=False)
                  print(f"Added {service_name} to managed-services.yaml")

              # 2. Add env vars to service-config-manager polytope.yml
              with open(config_manager_polytope) as f:
                  cm_config = yaml.safe_load(f) or {}

              cm_tool = cm_config.get("tools", {}).get(config_manager_service, {})
              env_vars_added = False
              for step in cm_tool.get("run", []):
                  args = step.get("args", {}) if isinstance(step, dict) else {}
                  if "env" not in args:
                      continue
                  env = args["env"]
                  prefix = service_name.upper().replace("-", "_")
                  new_vars = [
                      {"name": f"{prefix}_HOST", "value": f"pt.value {service_name}-host"},
                      {"name": f"{prefix}_USERNAME", "value": f"pt.value {service_name}-username"},
                      {"name": f"{prefix}_PASSWORD", "value": f"pt.secret {service_name}-password"},
                      {"name": f"{prefix}_DB", "value": f"pt.value {service_name}-database"},
                  ]
                  for var in new_vars:
                      if not any(e["name"] == var["name"] for e in env):
                          env.append(var)
                          env_vars_added = True
                          print(f"Added env var: {var['name']}")

              if env_vars_added:
                  with open(config_manager_polytope, "w") as f:
                      yaml.dump(cm_config, f, default_flow_style=False, sort_keys=False)
                  print("Updated service-config-manager/polytope.yml with new env vars")

              # 3. Create Curity postgres config (creates idsvr database)
              config_dir = Path(f"/repo/config/{service_name}")
              config_dir.mkdir(parents=True, exist_ok=True)
              config_file = config_dir / "postgres.sql"
              curity_sql = (
                  "-- Postgres Configuration for Curity Identity Server\n"
                  "-- Creates the idsvr database required by Curity\n"
                  "\n"
                  "SELECT 'CREATE DATABASE idsvr'\n"
                  "WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'idsvr')\\\\gexec\n"
              )
              if not config_file.exists():
                  with open(config_file, "w") as f:
                      f.write(curity_sql)
                  print(f"Created Curity postgres config: {config_file}")
              else:
                  # Ensure idsvr database creation is present
                  existing = config_file.read_text()
                  if 'idsvr' not in existing:
                      with open(config_file, "a") as f:
                          f.write("\n" + curity_sql)
                      print(f"Appended idsvr database creation to {config_file}")

      - id: add-python-client
        after:
          - step: ensure-kong-exists
          - step: ensure-curity-exists
          - step: register-postgres-with-scm
        tool: add-client
        args:
          template:
            jwt-validator: {}

      - id: add-typescript-client
        tool: add-client
        args:
          template:
            phantom-token-handler: {}

      - id: set-secrets
        after:
          - step: add-typescript-client
          - step: ensure-kong-exists
          - step: ensure-curity-exists
          - step: register-postgres-with-scm
        code: |-
          pt.js
          // Inline set-values-and-secrets for implement/curity-phantom-token
          // (avoids Polytope template resolution bug in nested tool calls)
          const apiService = pt.param("api-service");
          const webAppService = pt.param("web-app-service");
          const kongService = pt.param("kong-service");
          pt.log(`set-secrets: apiService=${apiService}, webAppService=${webAppService}, kongService=${kongService}`);
          const sourceValues = pt.readRepoFile(
            "tool_resources/set-values-and-secrets/implement/curity-phantom-token/values.yml",
            { repo: pt.moduleRepoRef }
          );
          const sourceSecrets = pt.readRepoFile(
            "tool_resources/set-values-and-secrets/implement/curity-phantom-token/secrets.yml",
            { repo: pt.moduleRepoRef }
          );

          const escValues = sourceValues.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
          const escSecrets = sourceSecrets.replace(/\\/g, "\\\\").replace(/'/g, "\\'");

          const script = `
          import yaml
          from pathlib import Path

          new_values = yaml.safe_load('''${escValues}''') or {}
          new_secrets = yaml.safe_load('''${escSecrets}''') or {}

          config_dir = Path('/repo/config')
          config_dir.mkdir(parents=True, exist_ok=True)
          values_file = config_dir / 'values.yml'
          secrets_file = config_dir / 'secrets.yml'

          existing_values = yaml.safe_load(open(values_file).read()) if values_file.exists() else {}
          existing_values = existing_values or {}
          existing_secrets = yaml.safe_load(open(secrets_file).read()) if secrets_file.exists() else {}
          existing_secrets = existing_secrets or {}

          existing_values.update(new_values)
          existing_secrets.update(new_secrets)

          # Inject dynamic hostname values derived from tool inputs
          apiService = '${apiService}'
          webAppService = '${webAppService}'
          kongService = '${kongService}'

          existing_values['api-service-host'] = f'http://{apiService}'
          existing_values['web-app-host'] = f'http://{webAppService}'

          # External gateway URL (browser-accessible Kong proxy)
          kong_ext_host = existing_values.get(f'{kongService}-external-host', 'http://localhost')
          kong_proxy_port = existing_values.get(f'{kongService}-proxy-port', '8000')
          gateway_url = f'{kong_ext_host}:{kong_proxy_port}'
          existing_values['gateway-base-url'] = gateway_url
          existing_values['web-app-url'] = gateway_url
          existing_values['curity-base-url'] = gateway_url

          # Introspection endpoint (internal, container-to-container)
          curity_host = existing_values.get('curity-host', 'curity')
          curity_port = existing_values.get('curity-port', '8443')
          existing_values['curity-introspection-endpoint'] = f'http://{curity_host}:{curity_port}/oauth/v2/oauth-introspect'

          # Propagate ports from service values
          existing_values.setdefault('web-app-port', existing_values.get(f'{webAppService}-http-port', '51732'))
          existing_values.setdefault('curity-port', existing_values.get('curity-port', '8443'))

          with open(values_file, 'w') as f:
              f.write('# Configuration values\\n# Generated and managed by Bluetext tools\\n\\n')
              if existing_values:
                  yaml.dump(existing_values, f, default_flow_style=False, sort_keys=True)

          with open(secrets_file, 'w') as f:
              f.write('# Configuration secrets\\n# Add this file to .gitignore\\n# Generated and managed by Bluetext tools\\n\\n')
              if existing_secrets:
                  yaml.dump(existing_secrets, f, default_flow_style=False, sort_keys=True)

          print(f"Written {len(new_values)} values and {len(new_secrets)} secrets")
          print(f"Computed gateway-base-url={gateway_url}, curity-base-url={gateway_url}")
          print(f"Computed curity-introspection-endpoint=http://{curity_host}:{curity_port}/oauth/v2/oauth-introspect")
          `;

          pt.callModule("pt/run-script", {
            repo: { type: "host", path: "." },
            language: "python",
            dependencies: ["pyyaml"],
            script: { type: "string", data: script }
          });

          // Set values/secrets in Polytope runtime
          const values = pt.readYaml(pt.readRepoFile("config/values.yml")) || {};
          const secrets = pt.readYaml(pt.readRepoFile("config/secrets.yml")) || {};
          for (const [k, v] of Object.entries(values)) {
            const key = k.replace(/([a-z0-9])([A-Z])/g, "$1-$2").replace(/[_ ]+/g, "-").toLowerCase();
            pt.setProjectValue(key, String(v));
          }
          for (const [k, v] of Object.entries(secrets)) {
            const key = k.replace(/([a-z0-9])([A-Z])/g, "$1-$2").replace(/[_ ]+/g, "-").toLowerCase();
            pt.setSecret(key, String(v));
          }

      - id: generate-missing-secrets
        after: {step: set-secrets}
        tool: pt/run-script
        args:
          repo: {type: host, path: .}
          language: python
          dependencies: [pyyaml, cryptography]
          script:
            type: string
            data: |
              import yaml
              import secrets
              import string
              import sys
              from pathlib import Path
              from cryptography.hazmat.primitives import serialization
              from cryptography.hazmat.primitives.asymmetric import ec

              def generate_random_string(length=32):
                  alphabet = string.ascii_letters + string.digits
                  return ''.join(secrets.choice(alphabet) for i in range(length))

              def generate_ec_key(password=None):
                  """Generate an EC P-256 private key in PKCS8 PEM format.
                  EC P-256 is required because the oauth-proxy plugin uses ECDH key derivation.
                  RSA keys fail with 'operation not supported for this keytype'.
                  If password is provided, the key is encrypted with BestAvailableEncryption."""
                  key = ec.generate_private_key(ec.SECP256R1())
                  if password:
                      encryption = serialization.BestAvailableEncryption(password.encode())
                  else:
                      encryption = serialization.NoEncryption()
                  pem = key.private_bytes(
                      encoding=serialization.Encoding.PEM,
                      format=serialization.PrivateFormat.PKCS8,
                      encryption_algorithm=encryption
                  )
                  return pem.decode('utf-8')

              def pem_to_escaped(pem_str):
                  """Convert a PEM string with real newlines to escaped \\n format.
                  The PEM gets substituted into a double-quoted YAML string in kong.yml
                  (cookie_key: "${OAUTH_PROXY_COOKIE_KEY_PEM}"). Real newlines get folded
                  to spaces by YAML. Escaped \\n in single quotes stays literal through
                  env var injection, then YAML double-quote parsing converts them to
                  real newlines."""
                  return pem_str.strip().replace('\n', '\\n')

              secrets_path = Path("/repo/config/secrets.yml")

              if secrets_path.exists():
                  with open(secrets_path) as f:
                      existing_secrets = yaml.safe_load(f) or {}
              else:
                  existing_secrets = {}

              new_secrets = {}

              # 1. curity-phantom-token-client-secret
              if "curity-phantom-token-client-secret" not in existing_secrets:
                  print("Generating: curity-phantom-token-client-secret")
                  new_secrets["curity-phantom-token-client-secret"] = generate_random_string()

              # 2. kong-oauth-proxy-cookie-key (must be generated before PEM since it's used as password)
              if "kong-oauth-proxy-cookie-key" not in existing_secrets:
                  print("Generating: kong-oauth-proxy-cookie-key")
                  new_secrets["kong-oauth-proxy-cookie-key"] = generate_random_string()

              # 3. oauth-proxy-cookie-key-pem (EC P-256, encrypted with cookie key password)
              if "oauth-proxy-cookie-key-pem" not in existing_secrets:
                  cookie_key_pass = new_secrets.get("kong-oauth-proxy-cookie-key") or existing_secrets.get("kong-oauth-proxy-cookie-key")
                  if not cookie_key_pass:
                      print("ERROR: kong-oauth-proxy-cookie-key not available for PEM encryption", file=sys.stderr)
                      sys.exit(1)
                  print("Generating: oauth-proxy-cookie-key-pem (EC P-256, encrypted)")
                  new_secrets["oauth-proxy-cookie-key-pem"] = pem_to_escaped(generate_ec_key(password=cookie_key_pass))

              if new_secrets:
                  # Merge into existing
                  existing_secrets.update(new_secrets)

                  # Write secrets.yml manually to ensure PEM uses single-quoted YAML
                  # (yaml.dump would use block scalars which break env var substitution)
                  with open(secrets_path, 'w') as f:
                      f.write('# Configuration secrets\n')
                      f.write('# Add this file to .gitignore\n')
                      f.write('# Generated and managed by Bluetext tools\n\n')
                      for k in sorted(existing_secrets.keys()):
                          v = existing_secrets[k]
                          if '\\n' in str(v) or '-----BEGIN' in str(v):
                              # PEM keys: use single quotes to preserve escaped newlines
                              f.write(f"{k}: '{v}'\n")
                          else:
                              f.write(f"{k}: {v}\n")

                  print(f"Generated and saved {len(new_secrets)} missing secrets.")
              else:
                  print("All required secrets already exist.")

      - id: set-generated-secrets-in-runtime
        after: {step: generate-missing-secrets}
        code: |-
          pt.js
          try {
            const secrets = pt.readYaml(pt.readRepoFile("config/secrets.yml")) || {};
            pt.log("🔐 Ensuring secrets are in context");
            for (const [k, v] of Object.entries(secrets)) {
              pt.log(`  Setting secret: ${k} = ***`);
              pt.setSecret(k, String(v));
            }
          } catch (e) {
            pt.log(`⚠️ Could not read secrets: ${e}`);
          }

      - id: update-kong-config
        after: {step: set-secrets}
        code: |-
          pt.js
          const kongService = pt.param("kong-service");

          const script = `
          import yaml
          from pathlib import Path

          kong_service = "${kongService}"
          target_path = Path(f"/repo/config/{kong_service}/kong.yml")

          if not target_path.exists():
              print(f"target {target_path} does not exist. Please ensure Kong service is added and config/{kong_service}/kong.yml exists.")
              exit(1)

          with open(target_path) as f:
              existing_data = yaml.safe_load(f) or {}

          if "services" not in existing_data:
              existing_data["services"] = []

          existing_services = existing_data["services"]
          existing_names = {s.get("name") for s in existing_services if "name" in s}

          added_count = 0
          config_dir = Path("/kong-config")

          for config_file in config_dir.glob("*.yml"):
              print(f"Processing config file: {config_file.name}")
              with open(config_file) as f:
                  snippet_data = yaml.safe_load(f) or {}

              snippet_services = snippet_data.get("services", [])
              if not snippet_services:
                  continue

              for service in snippet_services:
                  name = service.get("name")
                  if name and name in existing_names:
                      print(f"Service '{name}' already exists in kong.yml - skipping.")
                  else:
                      print(f"Adding service '{name}' to kong.yml")
                      existing_services.append(service)
                      existing_names.add(name)
                      added_count += 1

          if added_count > 0:
              with open(target_path, 'w') as f:
                  yaml.dump(existing_data, f, default_flow_style=False, sort_keys=False)
              print(f"Successfully added {added_count} services to {target_path}")
          else:
              print("No new services added to kong.yml")
          `;

          pt.callModule("pt/run-script", {
            repo: { type: "host", path: "." },
            language: "python",
            dependencies: ["pyyaml"],
            mounts: [{
              path: "/kong-config",
              source: { type: "repo", repo: pt.moduleRepoRef, path: "/tool_resources/implement/curity-phantom-token/kong-config" }
            }],
            script: { type: "string", data: script }
          });

      - id: setup-kong-env-vars
        after: {step: update-kong-config}
        code: |-
          pt.js
          const kongService = pt.param("kong-service");
          const envVarsYaml = pt.readRepoFile(
            "tool_resources/setup-environment-variables/implement/curity-phantom-token/required-env-vars.yml",
            { repo: pt.moduleRepoRef }
          );
          const escEnvVars = envVarsYaml.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
          const script = `
          import yaml, re
          from pathlib import Path

          target = "${kongService}"
          env_vars_raw = yaml.safe_load('''${escEnvVars}''') or {}
          raw_env_vars = env_vars_raw.get('env_vars', [])
          env_vars = [item for item in raw_env_vars if isinstance(item, dict)]

          service_polytope_path = Path(f"/repo/services/{target}/polytope.yml")
          if not service_polytope_path.exists():
              print(f"Target service polytope.yml not found: {service_polytope_path}")
              exit(1)

          with open(service_polytope_path) as f:
              content = f.read()

          vars_to_add = [v for v in env_vars if v['name'] not in content]
          if not vars_to_add:
              print(f"All env vars already exist in services/{target}/polytope.yml")
              exit(0)

          env_entries = []
          for var in vars_to_add:
              name = var['name']
              if 'value' in var:
                  val = var['value']
                  if '"' in val:
                      env_entries.append(f"            - {{ name: {name}, value: '{val}' }}")
                  else:
                      env_entries.append(f'            - {{ name: {name}, value: "{val}" }}')
              else:
                  key = var['key']
                  is_secret = var.get('secret', False)
                  if is_secret:
                      env_entries.append(f'            - {{ name: {name}, value: pt.secret {key} }}')
                  else:
                      env_entries.append(f'            - {{ name: {name}, value: pt.value {key} }}')

          env_block = '\\n'.join(env_entries)
          env_pattern = r'(env:\\s*\\n(?:\\s+-[^\\n]*\\n)*)'
          match = re.search(env_pattern, content)
          if match:
              env_section = match.group(1)
              new_env_section = env_section.rstrip('\\n') + '\\n' + env_block + '\\n'
              new_content = content[:match.start()] + new_env_section + content[match.end():]
          else:
              print(f"No 'env:' section found in {service_polytope_path}.")
              print(env_block)
              exit(0)

          with open(service_polytope_path, 'w') as f:
              f.write(new_content)
          print(f"Added {len(vars_to_add)} env vars to services/{target}/polytope.yml")
          for var in vars_to_add:
              print(f"   - {var['name']}")
          `;
          pt.callModule("pt/run-script", {
            repo: { type: "host", path: "." },
            language: "python",
            dependencies: ["pyyaml"],
            script: { type: "string", data: script }
          });

      - id: setup-auth-infrastructure
        after:
          - step: setup-kong-env-vars
          - step: add-typescript-client
        code: |-
          pt.js
          const webAppService = pt.param("web-app-service");
          const defaultView = pt.param("web-app-default-view");

          const script = `
          from pathlib import Path
          import re

          web_app_service = "${webAppService}"
          default_view = "${defaultView}"

          routes_dir = Path(f"/repo/services/{web_app_service}/app/routes")
          routes_dir.mkdir(parents=True, exist_ok=True)

          # --- 1. Create callback.tsx ---
          callback_path = routes_dir / "callback.tsx"
          if callback_path.exists():
              print(f"callback.tsx already exists, skipping")
          else:
              callback_template = Path("/auth-templates/callback.tsx")
              if callback_template.exists():
                  callback_path.write_text(callback_template.read_text())
                  print(f"Created: services/{web_app_service}/app/routes/callback.tsx")
              else:
                  print(f"callback.tsx template not found at {callback_template}")

          # --- 2. Modify root.tsx to add AuthProvider ---
          root_path = Path(f"/repo/services/{web_app_service}/app/root.tsx")
          if not root_path.exists():
              print(f"root.tsx not found at {root_path}, skipping AuthProvider setup")
          else:
              root_content = root_path.read_text()

              auth_import = "import { AuthProvider } from '@clients/clients/phantom-token-handler/AuthContext';"
              needs_write = False

              # Add AuthProvider import if missing
              if 'AuthProvider' not in root_content:
                  # Find the last import line and add after it
                  import_lines = list(re.finditer(r'^import\\s.*$$', root_content, re.MULTILINE))
                  if import_lines:
                      last_import = import_lines[-1]
                      insert_pos = last_import.end()
                      root_content = root_content[:insert_pos] + '\\n' + auth_import + root_content[insert_pos:]
                      needs_write = True
                      print("Added AuthProvider import to root.tsx")
                  else:
                      root_content = auth_import + '\\n' + root_content
                      needs_write = True
                      print("Added AuthProvider import at top of root.tsx")

              # Wrap <Outlet /> with <AuthProvider>
              if 'AuthProvider' in root_content and '<AuthProvider>' not in root_content:
                  # Find <Outlet /> and wrap it
                  outlet_pattern = r'(<Outlet\\s*/?>)'
                  if re.search(outlet_pattern, root_content):
                      root_content = re.sub(
                          outlet_pattern,
                          r'<AuthProvider>\\n              \\1\\n            </AuthProvider>',
                          root_content,
                          count=1
                      )
                      needs_write = True
                      print("Wrapped <Outlet /> with <AuthProvider> in root.tsx")
                  else:
                      print("Could not find <Outlet /> in root.tsx")

              if needs_write:
                  root_path.write_text(root_content)

          # --- 3. Update routes.ts with callback route ---
          routes_path = Path(f"/repo/services/{web_app_service}/app/routes.ts")
          if not routes_path.exists():
              print(f"routes.ts not found at {routes_path}, skipping route registration")
          else:
              routes_content = routes_path.read_text()
              needs_write = False

              # Ensure 'route' is imported
              import_match = re.search(
                  r"import\\s*\\{([^}]*)\\}\\s*from\\s*[\\\"']@react-router/dev/routes[\\\"']",
                  routes_content
              )
              if import_match:
                  imports = import_match.group(1)
                  if 'route' not in imports:
                      new_imports = imports.rstrip() + ', route'
                      routes_content = routes_content[:import_match.start(1)] + new_imports + routes_content[import_match.end(1):]
                      needs_write = True
                      print("Added 'route' to @react-router/dev/routes import")

              # Register /callback route
              callback_route = 'route("callback", "routes/callback.tsx")'
              if callback_route not in routes_content:
                  # Try multiple array patterns: return [...], export default [...] satisfies ..., [...];}
                  array_match = re.search(r'(return\\s*\\[)(.*?)(\\])', routes_content, re.DOTALL)
                  if not array_match:
                      array_match = re.search(r'(export\\s+default\\s*\\[)(.*?)(\\]\\s*satisfies)', routes_content, re.DOTALL)
                  if not array_match:
                      array_match = re.search(r'(\\[)(.*?)(\\]\\s*;?\\s*\\})', routes_content, re.DOTALL)
                  if array_match:
                      array_content = array_match.group(2)
                      new_entry = f',\\n    {callback_route}' if array_content.strip() else f'\\n    {callback_route}'
                      insert_pos = array_match.end(2)
                      routes_content = routes_content[:insert_pos] + new_entry + routes_content[insert_pos:]
                      needs_write = True
                      print("Registered /callback route in routes.ts")

              if needs_write:
                  routes_path.write_text(routes_content)

          # --- 4. Update home.tsx with auth-aware login/dashboard buttons ---
          home_path = routes_dir / "home.tsx"
          if not home_path.exists():
              print(f"home.tsx not found, skipping auth setup")
          else:
              home_content = home_path.read_text()

              if 'startLogin' in home_content:
                  print(f"Auth already integrated in home.tsx")
              else:
                  needs_write = False
                  view_capitalized = default_view.capitalize()

                  # Add required imports
                  imports_to_add = []
                  if 'Link' not in home_content:
                      imports_to_add.append("import { Link } from 'react-router';")
                  if 'useAuth' not in home_content:
                      imports_to_add.append("import { useAuth } from '@clients/clients/phantom-token-handler/AuthContext';")
                  if 'startLogin' not in home_content:
                      imports_to_add.append("import { startLogin } from '@clients/clients/phantom-token-handler/client';")

                  if imports_to_add:
                      import_block = '\\n'.join(imports_to_add)
                      import_lines = list(re.finditer(r'^import\\s.*$$', home_content, re.MULTILINE))
                      if import_lines:
                          last_import = import_lines[-1]
                          home_content = home_content[:last_import.end()] + '\\n' + import_block + home_content[last_import.end():]
                      else:
                          home_content = import_block + '\\n' + home_content
                      needs_write = True

                  # Build the auth-aware JSX block
                  auth_jsx = f"""
              <div className="mt-8 text-center">
                  <AuthButtons defaultView="{default_view}" viewLabel="{view_capitalized}" />
              </div>"""

                  # Insert before the outermost closing tag
                  closing_tags = list(re.finditer(r'^\\s*</\\w+>\\s*$$', home_content, re.MULTILINE))
                  if len(closing_tags) >= 1:
                      last_tag = closing_tags[-1]
                      home_content = home_content[:last_tag.start()] + auth_jsx + '\\n' + home_content[last_tag.start():]
                      needs_write = True
                      print(f"Added auth buttons to home.tsx")
                  else:
                      print(f"Could not find suitable insertion point in home.tsx")

                  # Add the AuthButtons component before the default export
                  comp_lines = [
                      'function AuthButtons({ defaultView, viewLabel }: { defaultView: string; viewLabel: string }) {',
                      '    const { isLoggedIn, isPageLoaded } = useAuth();',
                      '',
                      '    if (!isPageLoaded) {',
                      '        return (',
                      '            <div className="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600 mx-auto" />',
                      '        );',
                      '    }',
                      '',
                      '    if (isLoggedIn) {',
                      '        return (',
                      '            <Link to={"/" + defaultView} className="text-blue-600 hover:underline font-medium">',
                      '                Go to {viewLabel} &rarr;',
                      '            </Link>',
                      '        );',
                      '    }',
                      '',
                      '    return (',
                      '        <button',
                      '            onClick={() => startLogin()}',
                      '            className="inline-flex items-center px-6 py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors"',
                      '        >',
                      '            Login',
                      '        </button>',
                      '    );',
                      '}',
                  ]
                  auth_buttons_component = '\\n'.join(comp_lines) + '\\n'

                  # Insert the component before the default export function
                  export_match = re.search(r'^export\\s+default\\s+function', home_content, re.MULTILINE)
                  if export_match:
                      home_content = home_content[:export_match.start()] + auth_buttons_component + '\\n' + home_content[export_match.start():]
                      needs_write = True
                  else:
                      # Try 'export default' without function keyword
                      export_match = re.search(r'^export\\s+default\\s', home_content, re.MULTILINE)
                      if export_match:
                          home_content = home_content[:export_match.start()] + auth_buttons_component + '\\n' + home_content[export_match.start():]
                          needs_write = True

                  if needs_write:
                      home_path.write_text(home_content)
                      print(f"Auth-aware home.tsx setup complete")

          print("Auth infrastructure setup complete")
          `;

          pt.callModule("pt/run-script", {
            repo: { type: "host", path: "." },
            language: "python",
            mounts: [{
              path: "/auth-templates",
              source: { type: "repo", repo: pt.moduleRepoRef, path: "/tool_resources/implement/curity-phantom-token/auth-templates" }
            }],
            script: { type: "string", data: script }
          });

      - id: configure-curity-datasource
        after:
          - step: run-stack
        code: |-
          pt.js
          pt.log("Configuring Curity datasource via idsh...");
          var cmd = 'sh -c \'printf "configure\\nset facilities data-sources data-source default-datasource jdbc connection-string \\"jdbc:postgresql://$POSTGRES_HOST:$POSTGRES_PORT/idsvr\\"\\nset facilities data-sources data-source default-datasource jdbc username $POSTGRES_USERNAME\\nset facilities data-sources data-source default-datasource jdbc password $POSTGRES_PASSWORD\\ncommit\\nexit\\n" | /opt/idsvr/bin/idsh -N -u admin\'';
          pt.callModule("polytope/container!exec", {
            container: "curity-idsvr",
            cmd: cmd
          });
          pt.log("Curity ConfD datasource updated successfully");

      - id: scaffold-default-protected-view
        after: {step: setup-auth-infrastructure}
        code: |-
          pt.js
          const webAppService = pt.param("web-app-service");
          const viewName = pt.param("web-app-default-view");
          pt.log(`Scaffolding default protected view '${viewName}' for service '${webAppService}'`);
          pt.callModule("scaffold-phantom-token-protected-view", {
            name: viewName,
            service: webAppService
          });

      - id: run-stack
        after:
          - step: scaffold-default-protected-view
          - step: set-generated-secrets-in-runtime
        code: |-
          pt.js
          pt.log("Running stack to apply all configuration changes...");
          pt.callModule("stack", {});

      - id: install-web-app-client-deps
        after: {step: run-stack}
        code: |-
          pt.js
          const webAppService = pt.param("web-app-service");
          pt.log(`Installing phantom-token-handler client dependencies in ${webAppService}...`);
          pt.callModule("add-dependency", {
            service: webAppService,
            packages: "@curity/token-handler-js-assistant"
          });
